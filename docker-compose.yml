services:
  a450:
    build: .
    image: a450:latest
    ports:
      - "8501:8501"
    volumes:
      - ./output:/app/output
    environment:
      - A450_BASE_DIR=/app
      - AI_PLATFORM_API_KEY=${AI_PLATFORM_API_KEY:-}
      - AI_PLATFORM_BASE_URL=${AI_PLATFORM_BASE_URL:-https://maas-llm-aiplatform-hcm.api.vngcloud.vn/v1}
      - ENABLE_TELEGRAM_BOT=${ENABLE_TELEGRAM_BOT:-false}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    restart: unless-stopped
